<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regístrate | SaFeBeat</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
    }

    .auth-title {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-title h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .auth-title p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--bg-color);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-family: inherit;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
    }

    .social-auth {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--bg-color);
      border: 1px solid var(--border);
      padding: 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-main);
      transition: var(--transition);
      font-weight: 500;
    }

    .btn-social:hover {
      border-color: var(--primary);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider::before {
      margin-right: 1em;
    }

    .divider::after {
      margin-left: 1em;
    }

    .logo-center {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      gap: 0.5rem;
    }

    .logo-center span {
      color: var(--primary);
    }
  </style>
<script src="js/theme.js"></script>
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <a href="index.html" class="logo-center">
        <i class="ph-fill ph-ticket"></i> SaFe<span>Beat</span>
      </a>

      <div class="auth-title">
        <h1>Crea tu cuenta</h1>
        <p>Únete a la plataforma ms segura de reventa</p>
      </div>


      <form id="register-form">
        <div class="form-group">
          <label>Nombre y Apellido (Como en tu DNI)</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Juan Pérez" required>
        </div>
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="reg-email" class="form-control" placeholder="juan@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div style="position: relative;">
            <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required style="padding-right: 2.5rem;">
            <button type="button" class="toggle-password" data-target="reg-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2rem; color: var(--text-muted); cursor: pointer;"><i class="ph-bold ph-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label>Repetir Contraseña</label>
          <div style="position: relative;">
            <input type="password" id="reg-password-confirm" class="form-control" placeholder="••••••••" required style="padding-right: 2.5rem;">
            <button type="button" class="toggle-password" data-target="reg-password-confirm" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2rem; color: var(--text-muted); cursor: pointer;"><i class="ph-bold ph-eye"></i></button>
          </div>
        </div>

        <div
          style="display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
          <input type="checkbox" required id="terms" style="margin-top: 0.2rem; accent-color: var(--primary);">
          <label for="terms">Acepto los <a href="#" style="color: var(--primary);">Términos y Condiciones</a> y autorizo
            la validación de mi identidad para transacciones seguras.</label>
        </div>

        <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%;">Registrarme <i
            class="ph-bold ph-arrow-right"></i></button>
        <p id="error-msg"
          style="color: #ef4444; margin-top: 1rem; font-size: 0.9rem; text-align: center; display: none;"></p>
      </form>

      <div class="auth-footer">
        ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN and Client initialization -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=3"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.MiSupabase) {
        const { data: { session } } = await window.MiSupabase.auth.getSession();
        if (session) {
          window.location.replace('dashboard.html');
        }
      }

      // Lógica para mostrar/ocultar contraseñas
      document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', function() {
          const targetId = this.getAttribute('data-target');
          const input = document.getElementById(targetId);
          const icon = this.querySelector('i');
          if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('ph-eye');
            icon.classList.add('ph-eye-closed');  // Usando el ícono tachado de Phosphor
          } else {
            input.type = 'password';
            icon.classList.remove('ph-eye-closed');
            icon.classList.add('ph-eye');
          }
        });
      });
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!window.MiSupabase) {
        alert("Falta configurar las claves de Supabase en supabase-client.js para que el registro sea real. Por ahora, navegaremos a la verificación de prueba.");
        const fakeEmail = document.getElementById('reg-email').value;
        window.location.href = `verify-email.html?email=${encodeURIComponent(fakeEmail)}`;
        return;
      }

      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-password-confirm').value;
      const fullName = document.getElementById('reg-name').value;
      const btn = document.getElementById('btn-submit');
      const errorMsg = document.getElementById('error-msg');

      if (password !== confirmPassword) {
        errorMsg.innerText = "Las contraseñas no coinciden. Por favor, revísalas.";
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMsg.innerText = "La contraseña debe tener al menos 6 caracteres.";
        errorMsg.style.display = 'block';
        return;
      }

      btn.innerHTML = 'Cargando...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      const { data, error } = await window.MiSupabase.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: fullName
          },
          // Pasamos explícitamente a dónde queremos que vaya tras confirmar el mail
          emailRedirectTo: window.location.origin + '/confirmado.html'
        }
      });

      btn.innerHTML = 'Registrarme <i class="ph-bold ph-arrow-right"></i>';
      btn.disabled = false;

      if (error) {
        errorMsg.innerText = error.message;
        errorMsg.style.display = 'block';
      } else {
        // Redirigir a verificar
        window.location.href = `verify-email.html?email=${encodeURIComponent(email)}`;
      }
    });
  </script>
  <!-- Mobile Bottom Nav -->
  <div class="mobile-bottom-nav">
    <div class="mobile-nav-container">
      <a href="marketplace.html" class="mobile-nav-item" id="mob-nav-marketplace">
        <i class="ph ph-calendar-star"></i>
        <span>Eventos</span>
      </a>
      <a href="tickets.html" class="mobile-nav-item" id="mob-nav-tickets">
        <i class="ph ph-ticket"></i>
        <span>Entradas</span>
      </a>
      <div class="mobile-nav-fab-container">
        <a href="sell.html" class="mobile-nav-fab">
          <i class="ph ph-plus"></i>
        </a>
      </div>
      <a href="dashboard.html" class="mobile-nav-item" id="mob-nav-dashboard">
        <i class="ph ph-check-square-offset"></i>
        <span>Actividad</span>
      </a>
      <a href="profile.html" class="mobile-nav-item" id="mob-nav-profile">
        <i class="ph ph-user"></i>
        <span>Perfil</span>
      </a>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const path = window.location.pathname;
      if (path.includes('marketplace')) {
        document.getElementById('mob-nav-marketplace')?.classList.add('active');
      } else if (path.includes('tickets')) {
        document.getElementById('mob-nav-tickets')?.classList.add('active');
      } else if (path.includes('dashboard')) {
        document.getElementById('mob-nav-dashboard')?.classList.add('active');
      } else if (path.includes('profile')) {
        document.getElementById('mob-nav-profile')?.classList.add('active');
      }
    });
  </script>
</body>

</html>
