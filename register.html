<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Regístrate | SafeTicket</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Tailwind setup -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          display: inline-block;
          line-height: 1;
      }
      ::-webkit-scrollbar {
          display: none;
      }
  </style>
  <script src="js/theme.js"></script>
</head>

<body>
  <div class="min-h-[100dvh] flex items-center justify-center p-4 relative overflow-hidden bg-background">
    <!-- Decorative background glow -->
    <div class="absolute top-0 right-0 w-[40vw] h-[40vw] bg-primary/10 rounded-full blur-[6rem] pointer-events-none transform translate-x-1/3 -translate-y-1/3"></div>
    <div class="absolute bottom-0 left-0 w-[40vw] h-[40vw] bg-tertiary/10 rounded-full blur-[6rem] pointer-events-none transform -translate-x-1/3 translate-y-1/3"></div>

    <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-[2rem] p-8 md:p-12 w-full max-w-[28rem] shadow-2xl relative z-10 backdrop-blur-md">
      <a href="index.html" class="flex justify-center items-center gap-2 text-2xl font-black mb-6 text-[#5144d4] dark:text-[#7A70FF] transition-transform active:scale-95 hover:opacity-90">
        <span class="material-symbols-outlined text-[1.8rem]">confirmation_number</span>
        SafeTicket
      </a>
      
      <div class="text-center mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-on-surface mb-2 tracking-tight">Crea tu cuenta</h1>
        <p class="text-on-surface-variant text-sm md:text-base">Únete a la plataforma más segura de reventa</p>
      </div>

      <form id="register-form" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-on-surface mb-1.5 ml-1">Nombre y Apellido <span class="text-[11px] text-on-surface-variant font-medium opacity-80">(Como en tu DNI)</span></label>
          <input type="text" id="reg-name" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="Juan Pérez" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-on-surface mb-1.5 ml-1">Correo Electrónico</label>
          <input type="email" id="reg-email" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="juan@ejemplo.com" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-on-surface mb-1.5 ml-1">Contraseña</label>
          <div class="relative">
            <input type="password" id="reg-password" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="••••••••" required>
            <button type="button" class="toggle-password absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none p-2 rounded-full hover:bg-surface-container" data-target="reg-password">
               <span class="material-symbols-outlined text-[1.25rem] block pointer-events-none">visibility</span>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-on-surface mb-1.5 ml-1">Repetir Contraseña</label>
          <div class="relative">
            <input type="password" id="reg-password-confirm" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="••••••••" required>
            <button type="button" class="toggle-password absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none p-2 rounded-full hover:bg-surface-container" data-target="reg-password-confirm">
               <span class="material-symbols-outlined text-[1.25rem] block pointer-events-none">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-start gap-2 pt-2 pb-1">
          <input type="checkbox" required id="terms" class="mt-[0.2rem] rounded text-primary focus:ring-primary bg-surface-container-low border-outline-variant/50 w-4 h-4 cursor-pointer">
          <label for="terms" class="text-xs text-on-surface-variant leading-relaxed cursor-pointer select-none">
            Acepto los <a href="#" class="text-primary font-bold hover:underline">Términos y Condiciones</a> y autorizo la validación de mi identidad.
          </label>
        </div>

        <button type="submit" id="btn-submit" class="w-full bg-primary text-on-primary py-3.5 mt-2 rounded-[1rem] font-bold shadow-lg shadow-primary/20 hover:bg-[#4338ca] hover:shadow-primary/30 active:scale-95 transition-all flex justify-center items-center gap-2">
          Registrarme
          <span class="material-symbols-outlined text-[1.25rem]">arrow_forward</span>
        </button>
        <p id="error-msg" class="text-error text-[13px] text-center mt-3 hidden font-medium bg-error/10 py-2 px-3 rounded-lg"></p>
      </form>

      <div class="text-center mt-6 text-on-surface-variant text-sm border-t border-outline-variant/20 pt-5">
        ¿Ya tienes una cuenta? <a href="login.html" class="text-primary font-bold hover:underline ml-1">Inicia sesión</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN and Client initialization -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=3"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.MiSupabase) {
        const { data: { session } } = await window.MiSupabase.auth.getSession();
        if (session) {
          window.location.replace('dashboard.html');
        }
      }

      // Lógica para mostrar/ocultar contraseñas
      document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', function() {
          const targetId = this.getAttribute('data-target');
          const input = document.getElementById(targetId);
          const icon = this.querySelector('span');
          if (input.type === 'password') {
            input.type = 'text';
            icon.innerText = 'visibility_off';
          } else {
            input.type = 'password';
            icon.innerText = 'visibility';
          }
        });
      });
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!window.MiSupabase) {
        alert("Falta configurar las claves de Supabase en supabase-client.js para que el registro sea real. Por ahora, navegaremos a la verificación de prueba.");
        const fakeEmail = document.getElementById('reg-email').value;
        window.location.href = `verify-email.html?email=${encodeURIComponent(fakeEmail)}`;
        return;
      }

      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-password-confirm').value;
      const fullName = document.getElementById('reg-name').value;
      const btn = document.getElementById('btn-submit');
      const errorMsg = document.getElementById('error-msg');

      if (password !== confirmPassword) {
        errorMsg.innerText = "Las contraseñas no coinciden. Por favor, revísalas.";
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMsg.innerText = "La contraseña debe tener al menos 6 caracteres.";
        errorMsg.style.display = 'block';
        return;
      }

      btn.innerHTML = 'Cargando...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      const { data, error } = await window.MiSupabase.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: fullName
          },
          // Pasamos explícitamente a dónde queremos que vaya tras confirmar el mail
          emailRedirectTo: window.location.origin + '/confirmado.html'
        }
      });

      btn.innerHTML = 'Registrarme <i class="ph-bold ph-arrow-right"></i>';
      btn.disabled = false;

      if (error) {
        errorMsg.innerText = error.message;
        errorMsg.style.display = 'block';
      } else {
        // Intento de forzar la creación del perfil en la base de datos pública inmediatamente
        if (data && data.user) {
           await window.MiSupabase.from('profiles').insert([{
             user_id: data.user.id,
             full_name: fullName,
             updated_at: new Date()
           }]);
        }
        
        // Redirigir a verificar
        window.location.href = `verify-email.html?email=${encodeURIComponent(email)}`;
      }
    });
  </script>
  <!-- Mobile Bottom Nav -->
  <div class="mobile-bottom-nav">
    <div class="mobile-nav-container">
      <a href="marketplace.html" class="mobile-nav-item" id="mob-nav-marketplace">
        <i class="ph ph-calendar-star"></i>
        <span>Eventos</span>
      </a>
      <a href="tickets.html" class="mobile-nav-item" id="mob-nav-tickets">
        <i class="ph ph-ticket"></i>
        <span>Entradas</span>
      </a>
      <div class="mobile-nav-fab-container">
        <a href="sell.html" class="mobile-nav-fab">
          <i class="ph ph-plus"></i>
        </a>
      </div>
      <a href="dashboard.html" class="mobile-nav-item" id="mob-nav-dashboard">
        <i class="ph ph-check-square-offset"></i>
        <span>Actividad</span>
      </a>
      <a href="profile.html" class="mobile-nav-item" id="mob-nav-profile">
        <i class="ph ph-user"></i>
        <span>Perfil</span>
      </a>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const path = window.location.pathname;
      if (path.includes('marketplace')) {
        document.getElementById('mob-nav-marketplace')?.classList.add('active');
      } else if (path.includes('tickets')) {
        document.getElementById('mob-nav-tickets')?.classList.add('active');
      } else if (path.includes('dashboard')) {
        document.getElementById('mob-nav-dashboard')?.classList.add('active');
      } else if (path.includes('profile')) {
        document.getElementById('mob-nav-profile')?.classList.add('active');
      }
    });
  </script>
</body>

</html>
