<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regístrate | SaFeBeat</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
    }

    .auth-title {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-title h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .auth-title p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--bg-color);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-family: inherit;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
    }

    .social-auth {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--bg-color);
      border: 1px solid var(--border);
      padding: 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-main);
      transition: var(--transition);
      font-weight: 500;
    }

    .btn-social:hover {
      border-color: var(--primary);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider::before {
      margin-right: 1em;
    }

    .divider::after {
      margin-left: 1em;
    }

    .logo-center {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      gap: 0.5rem;
    }

    .logo-center span {
      color: var(--primary);
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <a href="index.html" class="logo-center">
        <i class="ph-fill ph-ticket"></i> SaFe<span>Beat</span>
      </a>

      <div class="auth-title">
        <h1>Crea tu cuenta</h1>
        <p>Únete a la plataforma más segura de reventa</p>
      </div>


      <form id="register-form">
        <div class="form-group">
          <label>Nombre y Apellido (Como en tu DNI)</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Juan Pérez" required>
        </div>
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="reg-email" class="form-control" placeholder="juan@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
        </div>

        <div
          style="display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
          <input type="checkbox" required id="terms" style="margin-top: 0.2rem; accent-color: var(--primary);">
          <label for="terms">Acepto los <a href="#" style="color: var(--primary);">Términos y Condiciones</a> y autorizo
            la validación de mi identidad para transacciones seguras.</label>
        </div>

        <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%;">Registrarme <i
            class="ph-bold ph-arrow-right"></i></button>
        <p id="error-msg"
          style="color: #ef4444; margin-top: 1rem; font-size: 0.9rem; text-align: center; display: none;"></p>
      </form>

      <div class="auth-footer">
        ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN and Client initialization -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=3"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.MiSupabase) {
        const { data: { session } } = await window.MiSupabase.auth.getSession();
        if (session) {
          window.location.replace('dashboard.html');
        }
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!window.MiSupabase) {
        alert("Falta configurar las claves de Supabase en supabase-client.js para que el registro sea real. Por ahora, navegaremos a la verificación de prueba.");
        const fakeEmail = document.getElementById('reg-email').value;
        window.location.href = `verify-email.html?email=${encodeURIComponent(fakeEmail)}`;
        return;
      }

      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const fullName = document.getElementById('reg-name').value;
      const btn = document.getElementById('btn-submit');
      const errorMsg = document.getElementById('error-msg');

      btn.innerHTML = 'Cargando...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      const { data, error } = await window.MiSupabase.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: fullName
          }
        }
      });

      btn.innerHTML = 'Registrarme <i class="ph-bold ph-arrow-right"></i>';
      btn.disabled = false;

      if (error) {
        errorMsg.innerText = error.message;
        errorMsg.style.display = 'block';
      } else {
        // Redirigir a verificar
        window.location.href = `verify-email.html?email=${encodeURIComponent(email)}`;
      }
    });
  </script>
</body>

</html>
