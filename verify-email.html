<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar Email | SaFeBeat</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .icon-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--primary);
    }
    .auth-title {
      margin-bottom: 2rem;
    }
    .auth-title h1 {
      font-size: 1.8rem;
      margin-bottom: 0.8rem;
    }
    .auth-title p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .code-input-container {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .code-input {
      width: 50px;
      height: 60px;
      font-size: 1.5rem;
      text-align: center;
      border-radius: var(--radius-sm);
      background: var(--bg-color);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-family: inherit;
      font-weight: 700;
      transition: var(--transition);
    }
    .code-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    /* Hide arrows on number inputs */
    .code-input::-webkit-outer-spin-button,
    .code-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .code-input[type=number] {
      -moz-appearance: textfield;
    }
    .auth-footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      
      <div class="icon-container">
        <i class="ph-fill ph-envelope-open"></i>
      </div>
      
      <div class="auth-title">
        <h1>Verifica tu correo</h1>
        <p>Hemos enviado un enlace de confirmación a <br><strong id="display-email" style="color: var(--text-main);">...</strong>.</p>
        <p style="margin-top: 1rem; color: var(--text-muted);">Por favor, revisa tu bandeja de entrada y haz clic en el botón <strong>"Confirmar Correo"</strong> para activar tu cuenta.</p>
      </div>

      <div style="margin-top: 2rem;">
        <a href="login.html" class="btn btn-primary" style="width: 100%;">Ya confirmé mi cuenta <i class="ph-bold ph-arrow-right"></i></a>
      </div>

      <div class="auth-footer" style="margin-top: 2.5rem;">
        ¿No recibiste el correo? <a id="btn-resend" onclick="resendCode()">Reenviarlo</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN and Client initialization -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=4"></script>

  <script>
    // Obtener el email de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const userEmail = urlParams.get('email');
    if (userEmail) {
      document.getElementById('display-email').innerText = userEmail;
    }

    async function resendCode() {
      if (!window.MiSupabase || !userEmail) {
        alert("Enlace reenviado a tu correo (Modo Prueba).");
        return;
      }
      const { data, error } = await window.MiSupabase.auth.resend({
        type: 'signup',
        email: userEmail,
      });
      if (error) {
        alert("Error al reenviar: " + error.message);
      } else {
        alert("Se ha enviado un nuevo enlace a " + userEmail);
      }
    }


  </script>
</body>
</html>
