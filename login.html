<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Iniciar Sesión | SafeTicket</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
    }
    .auth-title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-title h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .auth-title p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--bg-color);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-family: inherit;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
    }
    .social-auth {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--bg-color);
      border: 1px solid var(--border);
      padding: 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-main);
      transition: var(--transition);
      font-weight: 500;
    }
    .btn-social:hover {
      border-color: var(--primary);
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .divider::before { margin-right: 1em; }
    .divider::after { margin-left: 1em; }
    
    .logo-center {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      gap: 0.5rem;
    }
    .logo-center span { color: var(--primary); }
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      color: var(--primary);
      margin-top: 0.5rem;
    }
  </style>
  <script src="js/theme.js"></script>
  <!-- Tailwind setup -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          display: inline-block;
          line-height: 1;
      }
      ::-webkit-scrollbar {
          display: none;
      }
  </style>
</head>
<body class="bg-background text-on-surface pb-24 md:pb-0 selection:bg-primary/20">
  <div class="min-h-[100dvh] flex items-center justify-center p-4 relative overflow-hidden bg-background">
    <!-- Decorative background glow -->
    <div class="absolute top-0 right-0 w-[40vw] h-[40vw] bg-primary/10 rounded-full blur-[6rem] pointer-events-none transform translate-x-1/3 -translate-y-1/3"></div>
    <div class="absolute bottom-0 left-0 w-[40vw] h-[40vw] bg-tertiary/10 rounded-full blur-[6rem] pointer-events-none transform -translate-x-1/3 translate-y-1/3"></div>

    <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-[2rem] p-8 md:p-12 w-full max-w-[28rem] shadow-2xl relative z-10 backdrop-blur-md">
      <a href="index.html" class="flex justify-center items-center gap-2 text-2xl font-black mb-8 text-[#5144d4] dark:text-[#7A70FF] transition-transform active:scale-95 hover:opacity-90">
        <span class="material-symbols-outlined text-[1.8rem]">confirmation_number</span>
        SafeTicket
      </a>
      
      <div class="text-center mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-on-surface mb-2 tracking-tight">Bienvenido de nuevo</h1>
        <p class="text-on-surface-variant text-sm md:text-base">Continúa donde lo dejaste</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-on-surface mb-2 ml-1">Correo Electrónico</label>
          <input type="email" id="login-email" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="juan@ejemplo.com" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-on-surface mb-2 ml-1">Contraseña</label>
          <input type="password" id="login-password" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="••••••••" required>
          <div class="flex justify-end mt-2 mr-1">
             <a href="#" class="text-xs font-semibold text-primary hover:text-[#4338ca] transition-colors">¿Olvidaste tu contraseña?</a>
          </div>
        </div>

        <button type="submit" id="btn-login" class="w-full bg-primary text-on-primary py-3.5 mt-2 rounded-[1rem] font-bold shadow-lg shadow-primary/20 hover:bg-[#4338ca] hover:shadow-primary/30 active:scale-95 transition-all flex justify-center items-center gap-2">
          Ingresar
          <span class="material-symbols-outlined text-[1.25rem]">arrow_forward</span>
        </button>
        <p id="error-msg" class="text-error text-[13px] text-center mt-4 hidden font-medium bg-error/10 py-2 px-3 rounded-lg"></p>
      </form>

      <div class="text-center mt-8 text-on-surface-variant text-sm border-t border-outline-variant/20 pt-6">
        ¿Aún no tienes cuenta? <a href="register.html" class="text-primary font-bold hover:underline ml-1">Regístrate</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN and Client initialization -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=4"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.MiSupabase) {
        const { data: { session } } = await window.MiSupabase.auth.getSession();
        if (session) {
          window.location.replace('dashboard.html');
        }
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!window.MiSupabase) {
        alert("Modo prueba: no hay configuraciÃ³n de Supabase. Ingresando sin validar...");
        window.location.href = 'dashboard.html';
        return;
      }

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('btn-login');
      const errorMsg = document.getElementById('error-msg');

      btn.innerHTML = 'Ingresando...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      const { data, error } = await window.MiSupabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      btn.innerHTML = 'Ingresar <i class="ph-bold ph-arrow-right"></i>';
      btn.disabled = false;

      if (error) {
        // Simple error translation hack
        let text = error.message;
        if (text.includes('Invalid login credentials')) text = 'Correo o contraseÃ±a incorrectos.';
        errorMsg.innerText = text;
        errorMsg.style.display = 'block';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
  <!-- Bottom Navigation Bar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-[100] flex justify-around items-center px-3 pb-3 pt-2 bg-[#faf9fd]/90 backdrop-blur-xl shadow-[0_-12px_32px_rgba(26,28,31,0.06)] rounded-t-[32px] border-t border-slate-200/50">
    <a href="index.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
        <span class="material-symbols-outlined text-[1.35rem]">home</span>
        <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Inicio</span>
    </a>
    <a href="marketplace.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
        <span class="material-symbols-outlined text-[1.35rem]">explore</span>
        <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Explorar</span>
    </a>
    <a href="sell.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
            <span class="material-symbols-outlined text-[1.35rem]">add_circle</span>
            <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Vender</span>
        </a>
    <a href="dashboard.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
        <span class="material-symbols-outlined text-[1.35rem]">confirmation_number</span>
        <span class="font-bold text-[9px] uppercase tracking-widest mt-1">ACTIVIDAD</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
        <span class="material-symbols-outlined text-[1.35rem]">person</span>
        <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Perfil</span>
    </a>
</nav>
</body>
</html>
