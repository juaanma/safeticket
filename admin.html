<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Verificaciones | SaFeBeat</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .admin-container {
      padding-top: 8rem;
      padding-bottom: 5rem;
    }
    .users-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .users-table th, .users-table td {
      padding: 1rem 1.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .users-table th {
      background: var(--surface-hover);
      font-weight: 600;
      color: var(--text-muted);
    }
    .badge-unverified {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      padding: 0.3rem 0.6rem;
      border-radius: var(--radius-xl);
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .badge-verified {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent);
      padding: 0.3rem 0.6rem;
      border-radius: var(--radius-xl);
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
  </style>
<script src="js/theme.js"></script>
</head>
<body>

  <!-- Navbar Simple -->
  <nav class="navbar">
    <div class="container nav-container" style="justify-content: space-between;">
      <a href="index.html" class="logo">
        <i class="ph-fill ph-ticket"></i> SaFe<span>Beat</span> <span style="font-size: 0.8rem; color: #ef4444; margin-left: 0.5rem; text-transform: uppercase;">Admin</span>
      </a>
    </div>
  </nav>

  <main class="container admin-container">
    <div style="margin-bottom: 2rem;">
      <h1>Panel de Revisión Manual</h1>
      <p style="color: var(--text-muted);">Gestiona los perfiles de los usuarios que han solicitado validación para vender entradas.</p>
    </div>

    <!-- Filtro -->
    <div style="margin-bottom: 1.5rem;">
      <select id="filter-status" class="form-control" style="width: auto; background: var(--surface);" onchange="loadUsers()">
        <option value="false">Pendientes de Revisión</option>
        <option value="true">Usuarios Aprobados</option>
      </select>
    </div>

    <!-- Tabla de Usuarios -->
    <div style="overflow-x: auto;">
      <table class="users-table">
        <thead>
          <tr>
            <th>ID del Usuario</th>
            <th>Nombre / Datos</th>
            <th>Estado Actual</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-list">
          <tr><td colspan="4" style="text-align: center;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=4"></script>
  
  <script>
    async function loadUsers() {
      if(!window.MiSupabase) return;
      const tbody = document.getElementById('users-list');
      const filterVerified = document.getElementById('filter-status').value === 'true';
      
      tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Buscando usuarios...</td></tr>';
      
      const { data: users, error } = await window.MiSupabase
        .from('profiles')
        .select('*')
        .eq('is_verified', filterVerified);

      if(error) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">Error: No tienes permisos de administrador o la tabla no existe.</td></tr>';
        return;
      }
      
      if(!users || users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No hay usuarios en esta lista.</td></tr>';
        return;
      }
      
      tbody.innerHTML = '';
      
      users.forEach(u => {
        const estadoHtml = u.is_verified 
          ? '<span class="badge-verified"><i class="ph-fill ph-seal-check"></i> Aprobado</span>'
          : '<span class="badge-unverified"><i class="ph-fill ph-warning-circle"></i> En Revisión</span>';
          
        const btnHtml = u.is_verified
          ? `<button onclick="toggleVerification('${u.user_id}', false)" class="btn btn-outline" style="border-color: #ef4444; color: #ef4444; padding: 0.4rem 0.8rem; font-size: 0.85rem;">Revocar</button>`
          : `<button onclick="toggleVerification('${u.user_id}', true)" class="btn btn-primary" style="background:#10b981; border:none; padding: 0.4rem 0.8rem; font-size: 0.85rem;">Aprobar</button>`;

        const row = `
          <tr>
            <td style="font-size: 0.85rem; color: var(--text-muted);">${u.user_id}</td>
            <td><strong>${u.full_name || 'Sin Nombre'}</strong> <br> <span style="font-size:0.85rem; color: var(--text-muted);">${u.phone || 'Sin teléfono'}</span></td>
            <td>${estadoHtml}</td>
            <td>${btnHtml}</td>
          </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', row);
      });
    }

    window.toggleVerification = async (userId, setTo) => {
      if(!confirm(`¿Estás seguro de querer ${setTo ? 'APROBAR' : 'REVOCAR'} a este usuario?`)) return;
      
      const { error } = await window.MiSupabase
        .from('profiles')
        .update({ is_verified: setTo })
        .eq('user_id', userId);
        
      if(error) {
        alert("Error al actualizar la base de datos.");
      } else {
        alert(`Usuario ${setTo ? 'Aprobado' : 'Rechazado'} correctamente.`);
        loadUsers();
      }
    }

    document.addEventListener('DOMContentLoaded', loadUsers);
  </script>
</body>
</html>
