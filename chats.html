<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mis Mensajes | SaFeBeat</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #faf9fd; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-[#faf9fd] text-[#1a1c1f] antialiased min-h-screen flex flex-col pt-24 pb-20 md:pb-0">

    <!-- Header Navigation -->
    <nav class="fixed top-0 left-0 w-full z-[100] bg-[#faf9fd]/90 backdrop-blur-xl border-b border-slate-200/50 shadow-[0_4px_30px_rgba(26,28,31,0.03)] transition-all duration-300" id="main-nav">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-[1.35rem] font-black tracking-tighter text-[#5144d4] hover:scale-105 transition-transform">
                <span class="material-symbols-outlined text-[1.8rem] hidden md:block">confirmation_number</span>
                SafeTicket
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="marketplace.html" class="text-[13.5px] font-bold text-slate-500 hover:text-[#5144d4] transition-colors relative after:absolute after:-bottom-2 after:left-0 after:w-full after:h-0.5 after:bg-[#5144d4] after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:origin-left">Explorar</a>
                <a href="sell.html" class="text-[13.5px] font-bold text-slate-500 hover:text-[#5144d4] transition-colors relative after:absolute after:-bottom-2 after:left-0 after:w-full after:h-0.5 after:bg-[#5144d4] after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:origin-left">Vender</a>
                <a href="dashboard.html" class="text-[13.5px] font-bold text-slate-500 hover:text-[#5144d4] transition-colors relative after:absolute after:-bottom-2 after:left-0 after:w-full after:h-0.5 after:bg-[#5144d4] after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:origin-left">Mi Actividad</a>
                <a href="profile.html" class="text-[13.5px] font-bold text-slate-500 hover:text-[#5144d4] transition-colors relative after:absolute after:-bottom-2 after:left-0 after:w-full after:h-0.5 after:bg-[#5144d4] after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:origin-left">Mi Perfil</a>
            </div>
            <div class="flex items-center gap-4 hidden md:flex" id="nav-desktop-actions">
                <span class="material-symbols-outlined animate-spin text-[#5144d4]">progress_activity</span>
            </div>
            <button class="md:hidden flex flex-col justify-center gap-1.5 w-10 h-10 bg-slate-100 items-center rounded-full active:scale-95 transition-transform" id="mobile-menu-btn">
                <div class="w-4 h-0.5 bg-[#1a1c1f] rounded-full"></div>
                <div class="w-4 h-0.5 bg-[#1a1c1f] rounded-full"></div>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-3xl w-full mx-auto px-4 md:px-8 pt-8">
        <!-- Header -->
        <div class="mb-10">
            <h1 class="text-3xl md:text-4xl font-black tracking-tight text-[#1a1c1f] mb-3 flex items-center gap-3">
                <span class="material-symbols-outlined text-[2.5rem] text-[#5144d4]" style="font-variation-settings: 'FILL' 1;">chat</span>
                Mis Mensajes
            </h1>
            <p class="text-slate-500 font-medium text-[15px] md:text-base leading-relaxed">
                Gestiona las entregas con tus compradores y vendedores de forma segura.
            </p>
        </div>
        
        <!-- Chats Container -->
        <div id="chats-list" class="flex flex-col gap-4">
            <!-- Loader -->
            <div class="bg-white rounded-3xl p-12 flex flex-col items-center justify-center text-slate-400 border border-slate-100 shadow-sm">
                <span class="material-symbols-outlined animate-spin text-4xl mb-4 text-[#5144d4]">refresh</span>
                <p class="font-medium">Cargando mensajes...</p>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar (Mobile Only) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-[100] flex justify-around items-center px-3 pb-3 pt-2 bg-[#faf9fd]/90 backdrop-blur-xl shadow-[0_-12px_32px_rgba(26,28,31,0.06)] rounded-t-[32px] border-t border-slate-200/50">
        <a href="index.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
            <span class="material-symbols-outlined text-[1.35rem]">home</span>
            <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Inicio</span>
        </a>
        <a href="marketplace.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
            <span class="material-symbols-outlined text-[1.35rem]" >explore</span>
            <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Explorar</span>
        </a>
        <a href="sell.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
            <span class="material-symbols-outlined text-[1.35rem]">add_circle</span>
            <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Vender</span>
        </a>
        <a href="chats.html" class="flex flex-col items-center justify-center text-[#5144d4] p-[0.35rem] active:scale-90 duration-200">
            <span class="material-symbols-outlined text-[1.35rem]"  style="font-variation-settings: 'FILL' 1;">chat</span>
            <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Mensajes</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center justify-center text-[#1a1c1f] opacity-60 p-[0.35rem] hover:opacity-100 transition-opacity active:scale-90 duration-200">
            <span class="material-symbols-outlined text-[1.35rem]">person</span>
            <span class="font-bold text-[9px] uppercase tracking-widest mt-1">Perfil</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=4"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/auth-ui.js"></script>
    <script src="js/chats.js"></script>
</body>
</html>
